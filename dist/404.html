<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТАЙНЫ КОСМОСА</title>
    <script>
      // SPA fallback — GitHub Pages отдаёт эту страницу на любой несуществующий роут
      // Скрипт берёт оригинальный путь и редиректит в приложение
      sessionStorage.setItem("_spa_path", location.pathname);
      location.replace(location.origin + "/index.html");
    </script>
  </head>

</html>
